services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: imdbgraph_test
      POSTGRES_USER: imdbgraph_user
      POSTGRES_PASSWORD: imdbgraph_test
    ports:
      - '${POSTGRES_PORT:-5434}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U imdbgraph_user -d imdbgraph_test']
      interval: 5s
      timeout: 5s
      retries: 10
