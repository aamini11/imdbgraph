name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_STEP_SUMMARY: /tmp/vitest-check-summary.md
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - run: vp check
      - run: vp test run --project unit

  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - run: vp test run --project browser --project server
      - uses: actions/upload-artifact@v4
        if: always()
        id: upload-report
        with:
          name: vitest-report
          path: html/
      - name: Viewer link in summary
        if: always()
        run: |
          echo "### Vitest HTML report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Download vitest-report artifact](${{ steps.upload-report.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "GitHub artifact URLs require authentication, so Vitest Viewer cannot auto-fetch them. Download the artifact zip and drop it into https://viewer.vitest.dev/ to inspect screenshot diffs." >> $GITHUB_STEP_SUMMARY
