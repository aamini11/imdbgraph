name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_STEP_SUMMARY: /tmp/vitest-check-summary.md
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - run: vp check
      - run: vp test run --project unit

  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - run: vp test run --project browser --project server
      - uses: mmkal/artifact.ci/upload@main
        if: always()
        id: upload-report
        with:
          name: vitest-report
          path: html/
          artifactci-mode: eager
      - name: Viewer link in summary
        if: always()
        run: |
          echo "### Vitest HTML report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View vitest-report](${{ steps.upload-report.outputs.artifactci_run_url }})" >> $GITHUB_STEP_SUMMARY
